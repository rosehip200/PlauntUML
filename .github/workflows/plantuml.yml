name: Generate PlantUML Diagrams

on:
  push:
    branches: [ "main" ]
    paths:
      - "docs/diagrams/**/*.puml"
      - ".github/workflows/plantuml.yml"

permissions:
  contents: write

jobs:
  plantuml:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate SVG
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/data \
            plantuml/plantuml \
            -tsvg docs/diagrams/*.puml

      - name: Commit SVG
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/diagrams/*.svg
          git commit -m "Auto-generate SVG diagrams" || echo "No changes"
          git push
